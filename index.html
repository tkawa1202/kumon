<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>公文 進捗アプリ</title>
<meta name="theme-color" content="#f8fafc">
<style>
  :root{
    --bg:#f8fafc; --card:#ffffff; --text:#334155; --muted:#64748b; --line:#cbd5e1;
    --math:#f472b6; --jp:#8b5cf6; --dark:#0f172a;
    --good:#d1fae5; --good-t:#047857;
    --ok:#dbeafe; --ok-t:#0369a1;
    --warn:#fef3c7; --warn-t:#b45309;
    --bad:#ffe4e6; --bad-t:#be123c;
    --none:#e2e8f0; --none-t:#475569;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:linear-gradient(180deg,#fdf2f8,#ffffff,#f8fafc); color:var(--text);
  }
  .wrap{max-width:1040px; margin:0 auto; padding:16px}
  .card{
    background:var(--card); border-radius:24px; padding:16px; margin-bottom:16px;
    box-shadow:0 6px 18px rgba(15,23,42,.06);
  }
  h1{font-size:28px; margin:0 0 8px}
  .sub{color:var(--muted); font-size:14px; line-height:1.6}
  .tip{margin-top:10px; background:#faf5ff; color:#6d28d9; border-radius:16px; padding:12px; font-size:13px; line-height:1.6}
  .grid{display:grid; gap:12px}
  .input-grid{grid-template-columns:1fr}
  label{display:block; font-size:13px; color:var(--muted); margin-bottom:6px}
  input, select{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:16px;
    font-size:16px; background:#fff; color:var(--text);
  }
  button{
    border:none; border-radius:16px; padding:12px 14px; font-size:16px; font-weight:700; cursor:pointer;
    background:var(--none); color:var(--text);
  }
  .primary{background:var(--dark); color:#fff}
  .secondary{background:#e2e8f0; color:#334155}
  .danger{background:#fee2e2; color:#b91c1c}
  .subject-tabs,.map-tabs,.side-tabs{display:flex; gap:8px; flex-wrap:wrap}
  .subject-tabs button,.side-tabs button{flex:1 1 0; min-height:44px}
  .active-math{background:var(--math)!important; color:#fff!important}
  .active-jp{background:var(--jp)!important; color:#fff!important}
  .active-side{background:var(--dark)!important; color:#fff!important}
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .stat{background:#f8fafc; border-radius:18px; padding:12px}
  .small{font-size:12px; color:var(--muted)}
  .big{font-size:26px; font-weight:800; margin-top:4px}
  .map{display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
  .box{border-radius:22px; padding:14px; background:#fff; border:1px solid #fbcfe8}
  .box.current{outline:3px solid #c4b5fd}
  .title-row{display:flex; justify-content:space-between; align-items:start; gap:8px}
  .level{font-size:24px; font-weight:800}
  .grade{font-size:13px; color:var(--muted)}
  .pill{border-radius:999px; padding:6px 10px; font-size:12px; font-weight:700; white-space:nowrap}
  .none{background:var(--none); color:var(--none-t)}
  .good{background:var(--good); color:var(--good-t)}
  .ok{background:var(--ok); color:var(--ok-t)}
  .warn{background:var(--warn); color:var(--warn-t)}
  .bad{background:var(--bad); color:var(--bad-t)}
  .bar-bg{height:10px; background:#f1f5f9; border-radius:999px; overflow:hidden; margin-top:6px}
  .bar{height:100%; background:var(--math)}
  .bar-jp{background:var(--jp)}
  .mini-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px}
  .mini{background:rgba(255,255,255,.75); border-radius:14px; padding:10px}
  .history-summary{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px}
  .grade-progress{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .grade-box{background:#f8fafc; border-radius:18px; padding:12px}
  .grade-box.current{outline:2px solid #c4b5fd; background:#faf5ff}
  .history-item{background:#f8fafc; border-radius:18px; padding:12px; margin-bottom:10px}
  .row1{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:8px}
  .badge{background:#fff; border-radius:999px; padding:5px 10px; font-size:12px; font-weight:700}
  .helper{font-size:13px; color:var(--muted); margin-top:8px; line-height:1.6}
  .material-preview{background:#f8fafc; border-radius:16px; padding:12px; font-weight:700}
  .form-actions,.entry-actions{display:flex; gap:8px; flex-wrap:wrap}
  .entry-actions button{font-size:13px; padding:8px 12px}
  @media (min-width:700px){
    .input-grid{grid-template-columns:1fr 1fr 1fr 1fr 1fr auto}
    .stats{grid-template-columns:repeat(4,1fr)}
    .map{grid-template-columns:repeat(4,1fr)}
    .grade-progress{grid-template-columns:repeat(4,1fr)}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>公文 進捗アプリ</h1>
    <div class="sub">問題数とミス数を入れると正解率を自動計算します。履歴の修正・削除ができ、教材番号は「レベル」「番号」「表/裏」で簡単に入力できます。</div>
    <div class="tip">進捗率は「到達率」で表示します。たとえば C36a を入力したら、Cレベルは 36 / 200 = 18% と表示されます。iPhoneでは Safari で開くと安定します。</div>
  </div>

  <div class="card">
    <div class="grid input-grid">
      <div>
        <label>日付</label>
        <input id="date" type="date">
      </div>
      <div>
        <label>教科</label>
        <div class="subject-tabs">
          <button id="sub_math" class="active-math" onclick="setSubject('算数')">算数</button>
          <button id="sub_jp" onclick="setSubject('国語')">国語</button>
        </div>
      </div>
      <div>
        <label>レベル</label>
        <select id="level"></select>
      </div>
      <div>
        <label>番号</label>
        <input id="materialNumber" type="number" min="1" max="200" placeholder="例: 36">
      </div>
      <div>
        <label>表 / 裏</label>
        <div class="side-tabs">
          <button id="side_a" class="active-side" onclick="setSide('a')">表 (a)</button>
          <button id="side_b" onclick="setSide('b')">裏 (b)</button>
        </div>
      </div>
      <div>
        <label>問題数</label>
        <input id="total" type="number" min="1" value="10">
      </div>
      <div>
        <label>ミス数</label>
        <input id="wrong" type="number" min="0" value="0">
      </div>
      <div style="display:flex;align-items:end">
        <div class="form-actions">
          <button id="submitBtn" class="primary" onclick="saveEntry()">追加</button>
          <button id="cancelBtn" class="secondary" onclick="cancelEdit()" style="display:none">編集をやめる</button>
        </div>
      </div>
    </div>
    <div class="helper">自動計算の正解率: <span id="liveAccuracy">100%</span></div>
    <div class="helper">教材番号プレビュー</div>
    <div class="material-preview"><span id="materialPreview">A1a</span></div>
  </div>

  <div class="card">
    <div class="map-tabs">
      <button id="tab_math" class="active-math" onclick="setActiveTab('算数')">算数マップ</button>
      <button id="tab_jp" onclick="setActiveTab('国語')">国語マップ</button>
    </div>
  </div>

  <div class="card">
    <div class="stats" id="stats"></div>
  </div>

  <div class="card">
    <div style="font-size:20px;font-weight:800;margin-bottom:12px">学年ごとの達成率</div>
    <div class="grade-progress" id="gradeProgress"></div>
  </div>

  <div class="card">
    <div class="map" id="map"></div>
  </div>

  <div class="card">
    <div style="font-size:20px;font-weight:800;margin-bottom:12px">履歴</div>
    <div class="history-summary" id="historySummary"></div>
    <div style="margin-top:14px" id="history"></div>
  </div>
</div>

<script>
const KEY = "kumon-final-simple-v6";
const LEGACY_KEYS = ["kumon-final-simple-v5","kumon-final-simple-v4"];
const mathLevels = ['A','B','C','D','E','F','G'];
const mathGrades = {A:'小1',B:'小2',C:'小3',D:'小4',E:'小5',F:'小6',G:'中1'};
const jpLevels = ['AⅠ','BⅠ','CⅠ','DⅠ','EⅠ','FⅠ','GⅠ','HⅠ','IⅠ','IⅡ'];
const jpGrades = {'AⅠ':'小1','BⅠ':'小2','CⅠ':'小3','DⅠ':'小4','EⅠ':'小5','FⅠ':'小6','GⅠ':'中1','HⅠ':'中1','IⅠ':'中1','IⅡ':'中1'};

let subject = "算数";
let activeTab = "算数";
let side = "a";
let editingId = null;
let entries = loadEntries();

function loadEntries(){
  try{
    const now = localStorage.getItem(KEY);
    if(now) return JSON.parse(now);
  }catch(e){}
  for(const k of LEGACY_KEYS){
    try{
      const old = localStorage.getItem(k);
      if(old){
        const parsed = JSON.parse(old);
        localStorage.setItem(KEY, old);
        return parsed;
      }
    }catch(e){}
  }
  return [];
}
function save(){ localStorage.setItem(KEY, JSON.stringify(entries)); }
function todayString(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseMath(material){
  const m = material.trim().match(/^([A-G])(\d{1,3})([ab])?$/i);
  if(!m) return null;
  return { level:m[1].toUpperCase(), num:Math.min(Number(m[2]),200), suffix:(m[3] || '').toLowerCase() };
}
function parseJP(material){
  const t = material.trim().replace(/III/g,'Ⅲ').replace(/II/g,'Ⅱ').replace(/I/g,'Ⅰ');
  const pats = ['AⅠ','BⅠ','CⅠ','DⅠ','EⅠ','FⅠ','GⅠ','HⅠ','IⅠ','IⅡ'];
  const found = pats.find(p=>t.startsWith(p));
  if(!found) return null;
  const rest = t.slice(found.length).trim();
  const m = rest.match(/^(\d{1,3})([ab])?$/i);
  if(!m) return null;
  return { level:found, num:Number(m[1]), suffix:(m[2] || '').toLowerCase() };
}
function compareParsed(a,b,levels){
  const ai = levels.indexOf(a.level), bi = levels.indexOf(b.level);
  if(ai !== bi) return ai - bi;
  const anum = a.num ?? 0, bnum = b.num ?? 0;
  if(anum !== bnum) return anum - bnum;
  const asuf = a.suffix || '', bsuf = b.suffix || '';
  if(asuf === bsuf) return 0;
  if(!asuf) return -1;
  if(!bsuf) return 1;
  return asuf.localeCompare(bsuf);
}
function materialLabel(parsed){
  return `${parsed.level}${parsed.num ?? ''}${parsed.suffix || ''}`;
}
function styleForAcc(avg){
  if(avg == null) return 'none';
  if(avg >= 95) return 'good';
  if(avg >= 85) return 'ok';
  if(avg >= 70) return 'warn';
  return 'bad';
}
function calcAccuracy(total, wrong){
  total = Number(total || 0);
  wrong = Number(wrong || 0);
  if(!total || total < 0) return 0;
  if(wrong < 0) wrong = 0;
  if(wrong > total) wrong = total;
  return Math.round(((total - wrong) / total) * 100);
}
function updateLiveAccuracy(){
  const total = Number(document.getElementById('total').value || 0);
  const wrong = Number(document.getElementById('wrong').value || 0);
  document.getElementById('liveAccuracy').textContent = calcAccuracy(total, wrong) + '%';
}
function populateLevels(selectedValue){
  const target = document.getElementById('level');
  const levels = subject === '算数' ? mathLevels : jpLevels;
  target.innerHTML = levels.map(v => `<option value="${v}" ${selectedValue===v ? 'selected' : ''}>${v}</option>`).join('');
}
function setSubject(v){
  subject = v;
  document.getElementById('sub_math').className = v === '算数' ? 'active-math' : '';
  document.getElementById('sub_jp').className = v === '国語' ? 'active-jp' : '';
  populateLevels();
  updateMaterialPreview();
}
function setActiveTab(v){
  activeTab = v;
  document.getElementById('tab_math').className = v === '算数' ? 'active-math' : '';
  document.getElementById('tab_jp').className = v === '国語' ? 'active-jp' : '';
  render();
}
function setSide(v){
  side = v;
  document.getElementById('side_a').className = v === 'a' ? 'active-side' : '';
  document.getElementById('side_b').className = v === 'b' ? 'active-side' : '';
  updateMaterialPreview();
}
function buildMaterial(){
  const level = document.getElementById('level').value;
  const num = Number(document.getElementById('materialNumber').value || 0);
  if(!level || !num) return '';
  return `${level}${num}${side}`;
}
function updateMaterialPreview(){
  document.getElementById('materialPreview').textContent = buildMaterial() || '未入力';
}
function resetForm(keepDate=true){
  editingId = null;
  if(!keepDate) document.getElementById('date').value = todayString();
  setSubject('算数');
  setSide('a');
  document.getElementById('materialNumber').value = '';
  document.getElementById('total').value = '10';
  document.getElementById('wrong').value = '0';
  document.getElementById('submitBtn').textContent = '追加';
  document.getElementById('cancelBtn').style.display = 'none';
  updateLiveAccuracy();
  updateMaterialPreview();
}
function saveEntry(){
  const date = document.getElementById('date').value || todayString();
  const material = buildMaterial();
  const total = Number(document.getElementById('total').value || 0);
  const wrong = Number(document.getElementById('wrong').value || 0);
  const parsed = subject === '算数' ? parseMath(material) : parseJP(material);

  if(!parsed){ alert('教材番号を確認してください'); return; }
  if(!total || total <= 0){ alert('問題数を入れてください'); return; }
  if(wrong < 0 || wrong > total){ alert('ミス数を見直してください'); return; }

  const accuracy = calcAccuracy(total, wrong);
  const row = { id: editingId || Date.now(), date, subject, material, total, wrong, accuracy };

  if(editingId){
    entries = entries.map(x => x.id === editingId ? row : x);
  }else{
    entries.push(row);
  }

  save();
  activeTab = subject;
  resetForm(true);
  render();
}
function editEntry(id){
  const e = entries.find(x => x.id === id);
  if(!e) return;
  editingId = id;
  document.getElementById('date').value = e.date;
  document.getElementById('total').value = e.total;
  document.getElementById('wrong').value = e.wrong;
  setSubject(e.subject);

  const parsed = e.subject === '算数' ? parseMath(e.material) : parseJP(e.material);
  if(parsed){
    populateLevels(parsed.level);
    document.getElementById('level').value = parsed.level;
    document.getElementById('materialNumber').value = parsed.num;
    setSide(parsed.suffix || 'a');
  }

  document.getElementById('submitBtn').textContent = '更新';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  updateLiveAccuracy();
  updateMaterialPreview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function cancelEdit(){
  resetForm(true);
}
function removeEntry(id){
  if(!confirm('この入力を削除しますか？')) return;
  entries = entries.filter(x => x.id !== id);
  save();
  if(editingId === id) cancelEdit();
  render();
}
function currentFor(sub){
  const levels = sub === '算数' ? mathLevels : jpLevels;
  const parse = sub === '算数' ? parseMath : parseJP;
  const arr = entries.filter(e => e.subject === sub).map(e => parse(e.material)).filter(Boolean);
  if(!arr.length) return null;
  arr.sort((a,b)=>compareParsed(a,b,levels));
  return arr[arr.length - 1];
}
function calcLevelProgress(sub, level){
  const parse = sub === '算数' ? parseMath : parseJP;
  const nums = entries
    .filter(e => e.subject === sub)
    .map(e => parse(e.material))
    .filter(p => p && p.level === level)
    .map(p => p.num);

  if(nums.length === 0) return 0;

  const maxNum = Math.max(...nums);
  return Math.round((maxNum / 200) * 100);
}
function buildBoxes(sub){
  const levels = sub === '算数' ? mathLevels : jpLevels;
  const grades = sub === '算数' ? mathGrades : jpGrades;
  const parse = sub === '算数' ? parseMath : parseJP;
  const current = currentFor(sub);

  return levels.map(level => {
    const items = entries.filter(e => e.subject === sub && parse(e.material)?.level === level);
    const avg = items.length ? Math.round(items.reduce((s,e)=>s+e.accuracy,0)/items.length) : null;
    const percent = calcLevelProgress(sub, level);
    let latest = '—';

    const parsedItems = items.map(e => parse(e.material)).filter(Boolean);
    if(parsedItems.length){
      parsedItems.sort((a,b)=>compareParsed(a,b,levels));
      latest = materialLabel(parsedItems[parsedItems.length - 1]);
    }

    return {
      level, grade: grades[level], avg, percent, latest,
      count: items.length, current: current && current.level === level
    };
  });
}
function getStats(){
  const today = todayString();
  const todayEntries = entries.filter(e => e.date === today);
  const todayCount = todayEntries.length;

  const uniqueDates = [...new Set(entries.map(e => e.date))].sort();
  let streak = 0, maxStreak = 0, currentStreak = 0;
  let prevDate = null;

  uniqueDates.forEach(date => {
    if(!prevDate){
      currentStreak = 1;
    }else{
      const diff = (new Date(date) - new Date(prevDate)) / (1000*60*60*24);
      if(diff === 1) currentStreak++;
      else currentStreak = 1;
    }
    maxStreak = Math.max(maxStreak, currentStreak);
    if(date === today) streak = currentStreak;
    prevDate = date;
  });

  return { todayCount, streak, maxStreak };
}
function uniqueGradeOrder(sub){
  const levels = sub === '算数' ? mathLevels : jpLevels;
  const gradeMap = sub === '算数' ? mathGrades : jpGrades;
  return [...new Set(levels.map(l => gradeMap[l]))];
}
function buildGradeProgress(sub){
  const boxes = buildBoxes(sub);
  const grades = uniqueGradeOrder(sub);
  return grades.map(grade => {
    const gradeBoxes = boxes.filter(b => b.grade === grade);
    const percent = gradeBoxes.length ? Math.round(gradeBoxes.reduce((sum,b)=>sum+b.percent,0) / gradeBoxes.length) : 0;
    const current = gradeBoxes.some(b => b.current);
    return { grade, percent, current };
  });
}
function renderStats(){
  const sub = activeTab;
  const current = currentFor(sub);
  const grades = sub === '算数' ? mathGrades : jpGrades;
  const currentGrade = current ? grades[current.level] : '未入力';
  const stats = getStats();

  const statHtml = [
    `<div class="stat"><div class="small">表示教科</div><div class="big">${sub}</div></div>`,
    `<div class="stat"><div class="small">現在地</div><div class="big">${current ? materialLabel(current) : '未入力'}</div></div>`,
    `<div class="stat"><div class="small">現在の学年帯</div><div class="big">${currentGrade}</div></div>`,
    `<div class="stat"><div class="small">ゴール</div><div class="big">${sub === '算数' ? 'G200' : 'IⅡ200'}</div></div>`
  ];
  document.getElementById('stats').innerHTML = statHtml.join('');

  document.getElementById('historySummary').innerHTML = `
    <div class="stat"><div class="small">今日の件数</div><div class="big">${stats.todayCount}件</div></div>
    <div class="stat"><div class="small">連続記録</div><div class="big">${stats.streak}日</div></div>
    <div class="stat"><div class="small">最高記録</div><div class="big">${stats.maxStreak}日</div></div>
  `;
}
function renderGradeProgress(){
  const rows = buildGradeProgress(activeTab);
  const colorClass = activeTab === '算数' ? 'bar' : 'bar bar-jp';
  document.getElementById('gradeProgress').innerHTML = rows.map(r => `
    <div class="grade-box ${r.current ? 'current' : ''}">
      <div class="small">${r.grade}</div>
      <div class="big">${r.percent}%</div>
      <div class="bar-bg"><div class="${colorClass}" style="width:${r.percent}%"></div></div>
    </div>
  `).join('');
}
function renderMap(){
  const boxes = buildBoxes(activeTab);
  const colorClass = activeTab === '算数' ? 'bar' : 'bar bar-jp';
  document.getElementById('map').innerHTML = boxes.map(b => `
    <div class="box ${b.current ? 'current' : ''}" style="background:${b.percent >= 100 ? '#fce7f3' : b.percent > 0 ? '#fdf2f8' : '#fff'}">
      <div class="title-row">
        <div>
          <div class="level">${b.current ? '👑 ' : ''}${b.level}</div>
          <div class="grade">${b.grade}</div>
        </div>
        <div class="pill ${styleForAcc(b.avg)}">${b.avg == null ? '未着手' : b.avg + '%'}</div>
      </div>
      <div style="margin-top:10px" class="small">到達率 ${b.percent}%</div>
      <div class="bar-bg"><div class="${colorClass}" style="width:${b.percent}%"></div></div>
      <div class="mini-grid">
        <div class="mini">
          <div class="small">入力数</div>
          <div style="font-weight:800">${b.count}件</div>
        </div>
        <div class="mini">
          <div class="small">最新</div>
          <div style="font-weight:800">${b.latest}</div>
        </div>
      </div>
    </div>
  `).join('');
}
function renderHistory(){
  const rows = [...entries].sort((a,b) => a.date === b.date ? b.id - a.id : (a.date < b.date ? 1 : -1));

  document.getElementById('history').innerHTML =
    rows.map(r => `
      <div class="history-item">
        <div class="row1">
          <div class="badge">${r.date}</div>
          <div class="badge">${r.subject}</div>
          <div class="badge">${r.material}</div>
          <div class="badge">問題数 ${r.total}</div>
          <div class="badge">ミス数 ${r.wrong}</div>
          <div class="pill ${styleForAcc(r.accuracy)}">${r.accuracy}%</div>
        </div>
        <div class="entry-actions">
          <button class="secondary" onclick="editEntry(${r.id})">修正</button>
          <button class="danger" onclick="removeEntry(${r.id})">削除</button>
        </div>
      </div>
    `).join('') || '<div class="small">まだ入力がありません</div>';
}
function render(){
  document.getElementById('tab_math').className = activeTab === '算数' ? 'active-math' : '';
  document.getElementById('tab_jp').className = activeTab === '国語' ? 'active-jp' : '';
  renderStats();
  renderGradeProgress();
  renderMap();
  renderHistory();
}

document.getElementById('date').value = todayString();
